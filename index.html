<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./favicon.ico" type="image/x-icon" />

        <title>Amarukusi</title>

        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                text-align: center;
            }

            body {
                display: grid;
                place-items: center;
                background-color: gray;
            }

            a {
                background-color: white;
                text-decoration: none;
                border-radius: 4px;
                padding: 0.5rem 1.5rem;
            }

            #canvas {
                width: min(100vw, 100vh);
                height: min(100vw, 100vh);
            }

            p {
                padding-block: 2rem;
            }
        </style>
    </head>

    <body>
        <noscript>Se requiere soporte a JavaScript</noscript>
        <canvas id="canvas"></canvas>
        <p>
            <a href="./doc/es/laws.pdf">Reglamento de Amarukusi</a>
        </p>
        <script type="module">
            import init, * as app from "./pkg/app.js";
            await init();

            const canvas = document.getElementById("canvas");
            const game = app.new_game(canvas, canvas.getContext("2d"));

            window.addEventListener("resize", () => game.canvas_resize());

            canvas.addEventListener(
                "pointerdown",
                game.board_update.bind(game),
            );
            canvas.addEventListener("pointerup", game.board_update.bind(game));
            canvas.addEventListener(
                "pointerleave",
                game.board_update.bind(game),
            );
            canvas.addEventListener(
                "pointermove",
                game.board_update.bind(game),
            );

            game.canvas_resize();
        </script>
    </body>
</html>
